exchange_rates:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('POSTGRES_HOST', 'postgres') }}"
      port: "{{ env_var('POSTGRES_PORT', '5432') | int }}"
      user: "{{ env_var('POSTGRES_USER', 'pipeline_user') }}"
      password: "{{ env_var('POSTGRES_PASSWORD', 'pipeline_pass') }}"
      dbname: "{{ env_var('POSTGRES_DB', 'pipeline') }}"
      schema: public
      threads: 4
